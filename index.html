<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GOD PUSH">

<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/179/179386.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ コード試す用</title>
    <style>
        :root {
            --bg-dark: #121212;
            --panel-dark: #1e1e1e;
            --accent: #00ff88;
            --white: #ffffff;
        }

        html, body {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background: var(--bg-dark);
            color: var(--white);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #wrapper { display: flex; flex-direction: column; height: 100vh; }

        header {
            background: #000;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        .logo { color: var(--accent); font-weight: bold; font-size: 18px; }

        main { display: flex; flex: 1; overflow: hidden; }

        /* エディタ側 */
        .editor-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
            background: var(--panel-dark);
        }

        .toolbar-top {
            padding: 10px;
            background: #111;
            display: flex;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        input[type="text"] {
            background: #000; border: 1px solid #444; color: #fff;
            padding: 6px 10px; border-radius: 4px; font-size: 12px; width: 90px;
        }

        button {
            background: #333; color: #fff; border: none;
            padding: 6px 12px; border-radius: 4px; cursor: pointer;
            font-size: 12px; font-weight: bold;
        }
        button:hover { background: #444; }
        .btn-main { background: var(--accent); color: #000; }

        textarea {
            flex: 1;
            background: transparent;
            color: #d4d4d4;
            border: none;
            resize: none;
            outline: none;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            padding: 15px;
        }

        /* プレビュー側 */
        .preview-pane {
            flex: 1;
            background: #fff;
            position: relative;
        }
        
        /* プレビュー本体 */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }
    </style>
</head>
<body>

<div id="wrapper">
    <header><div class="logo">⚡ PLAYGROUND</div></header>

    <main>
        <section class="editor-pane">
            <div class="toolbar-top">
                <input type="text" id="find-in" placeholder="探す単語">
                <input type="text" id="replace-in" placeholder="変える単語">
                <button onclick="runReplace()">置換</button>
                
                <input type="file" id="load-file" style="display:none" onchange="loadFile(event)">
                <button onclick="document.getElementById('load-file').click()">📂 読み込む</button>
                
                <button onclick="previewFullScreen()">📺 実行画面を全画面</button>
                
                <button class="btn-main" onclick="downloadCode()">▶ 保存 (Ctrl+S)</button>
            </div>
            <textarea id="editor" spellcheck="false" placeholder="HTMLコードを入力..." oninput="updatePreview()"></textarea>
        </section>

        <section class="preview-pane" id="preview-container">
            <iframe id="preview" allowfullscreen></iframe>
        </section>
    </main>
</div>

<script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');

    [span_0](start_span)// プレビューのリアルタイム更新[span_0](end_span)
    function updatePreview() {
        const doc = preview.contentDocument || preview.contentWindow.document;
        doc.open();
        doc.write(editor.value);
        doc.close();
    }

    [span_1](start_span)// 置換機能[span_1](end_span)
    function runReplace() {
        const f = document.getElementById('find-in').value;
        const r = document.getElementById('replace-in').value;
        if (f) {
            editor.value = editor.value.split(f).join(r);
            updatePreview();
        }
    }

    [span_2](start_span)// ファイル読み込み[span_2](end_span)
    function loadFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            editor.value = ev.target.result;
            updatePreview();
        };
        reader.readAsText(file);
    }

    // ★今回のメイン：実行画面（iframe）だけを全画面にする
    function previewFullScreen() {
        // iframeを包んでいるコンテナを取得
        const container = document.getElementById('preview-container');

        if (!document.fullscreenElement) {
            if (container.requestFullscreen) {
                container.requestFullscreen();
            } else if (container.webkitRequestFullscreen) {
                container.webkitRequestFullscreen();
            } else if (container.mozRequestFullScreen) {
                container.mozRequestFullScreen();
            } else if (container.msRequestFullscreen) {
                container.msRequestFullscreen();
            }
        } else {
            document.exitFullscreen();
        }
    }

    [span_3](start_span)// 保存機能 [cite: 94-96]
    function downloadCode() {
        const content = editor.value;
        const blob = new Blob([content], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "index.html";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    window.onload = updatePreview;
</script>

</body>
</html>
