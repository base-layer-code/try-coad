<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コード試せるよぉ！ - 統合版</title>
    <style>
        body {
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            background-color: #34495e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 80%;
            max-width: 600px;
        }
        textarea {
            width: 100%;
            height: 200px;
            margin-bottom: 20px;
            border-radius: 5px;
            border: none;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            background-color: #ecf0f1;
            color: #2c3e50;
        }
        button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>コード試せるよぉ！</h1>
        <p>ここにHTMLコードを入力してダウンロードボタンを押してね。</p>
        <textarea id="code-input" placeholder="<html>...</html>"></textarea>
        <br>
        <button id="download-btn">このコードをダウンロードする</button>
    </div>

    <script>
        document.getElementById('download-btn').addEventListener('click', function() {
            // テキストエリアの中身を取得
            const code = document.getElementById('code-input').value;
            
            if (!code) {
                alert("コードを入力してください！");
                return;
            }

            // ダウンロード処理
            downloadFile("index.html", code);
        });

        function downloadFile(filename, text) {
            const blob = new Blob([text], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;

            // --- 修正ポイント：GitHub Pagesやブラウザの制限対策 ---
            // リンクを一時的にドキュメントに追加してからクリックする
            document.body.appendChild(a);
            a.click();
            
            // 使用後は削除してメモリを解放
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
